name: Build and Deploy mzazicare-web

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  security-scan:
    runs-on: wasaa-org-runners
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified

  build-and-push:
    needs: security-scan
    runs-on: wasaa-org-runners
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/web-masters-ke/mzazicare-web:${{ github.sha }}
            ghcr.io/web-masters-ke/mzazicare-web:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: wasaa-org-runners
    steps:
      - name: Install yq
        run: |
          mkdir -p "$HOME/bin"
          curl -sL https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 \
            -o "$HOME/bin/yq" && chmod +x "$HOME/bin/yq"
          echo "$HOME/bin" >> $GITHUB_PATH
      - name: Checkout Ventures-Helm-Charts
        uses: actions/checkout@v4
        with:
          repository: web-masters-ke/Ventures-Helm-Charts
          ref: development
          token: ${{ secrets.HELM_CHARTS_PAT }}
      - name: Update web image tag
        run: yq e '.web.image.tag = "${{ github.sha }}"' -i charts/mzazicare-service/values.yaml
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add charts/mzazicare-service/values.yaml
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m "ci(mzazicare-web): update image tag to ${{ github.sha }}"
          for i in 1 2 3 4 5; do
            git push && break
            echo "Push failed, retrying with rebase (attempt $i)..."
            git pull --rebase origin development
            sleep $((i * 2))
          done
      - name: Trigger ArgoCD sync
        run: |
          curl -sf -X POST http://argocd-server.argocd.svc.cluster.local/api/v1/applications/mzazicare-service/sync \
            -H "Authorization: Bearer ${{ secrets.ARGOCD_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"prune":true,"dryRun":false,"force":false}' || true
      - name: Wait for ArgoCD health
        run: |
          for i in $(seq 1 20); do
            RESP=$(curl -sf http://argocd-server.argocd.svc.cluster.local/api/v1/applications/mzazicare-service \
              -H "Authorization: Bearer ${{ secrets.ARGOCD_TOKEN }}" 2>/dev/null || echo '{}')
            SYNC=$(echo "$RESP" | jq -r '.status.sync.status // empty')
            HEALTH=$(echo "$RESP" | jq -r '.status.health.status // empty')
            echo "[${i}] sync=$SYNC health=$HEALTH"
            [ "$SYNC" = "Synced" ] && [ "$HEALTH" = "Healthy" ] && exit 0
            sleep 15
          done
          echo "Timeout" && exit 1
