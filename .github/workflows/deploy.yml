name: Deploy MzaziCare Web

on:
  pull_request:
    branches: [main]
    types: [closed]
  workflow_dispatch:

jobs:
  build-and-deploy:
    if: github.event.pull_request.merged == true || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: mzazicare
          IMAGE_TAG: latest
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      - name: Deploy to Server via SSM
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --timeout-seconds 600 \
            --parameters "commands=[
              \"echo 'Starting MzaziCare Web deployment...'\",
              \"aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | docker login --username AWS --password-stdin ${ECR_REGISTRY}\",
              \"docker pull ${ECR_REGISTRY}/mzazicare:latest\",
              \"docker stop mzazicare-web 2>/dev/null || true\",
              \"docker rm mzazicare-web 2>/dev/null || true\",
              \"docker run -d --name mzazicare-web --restart unless-stopped --network mzazi-network -p 3001:3000 ${ECR_REGISTRY}/mzazicare:latest\",
              \"sleep 10\",
              \"docker ps --filter name=mzazicare-web --format 'table {{.Names}}\t{{.Status}}\t{{.Ports}}'\",
              \"curl -sf http://localhost:3001 && echo ' Web healthy' || echo 'Web not ready yet'\",
              \"echo 'MzaziCare Web deployment complete'\"
            ]" \
            --region ${{ secrets.AWS_REGION }}
