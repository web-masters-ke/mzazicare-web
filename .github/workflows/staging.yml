name: Build and Deploy MzaziCare Web (Staging)

on:
  push:
    branches: [staging]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build and Push to GHCR
    runs-on: wasaa-org-runners
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/web-masters-ke/mzazicare-web:staging-${{ github.sha }}
            ghcr.io/web-masters-ke/mzazicare-web:staging
          cache-from: type=gha
          cache-to: type=gha,mode=max

  update-helm-chart:
    name: Update Helm Chart Tag
    needs: build-and-push
    runs-on: wasaa-org-runners
    steps:
      - uses: actions/checkout@v4
        with:
          repository: web-masters-ke/Ventures-Helm-Charts
          ref: staging
          token: ${{ secrets.HELM_CHARTS_PAT }}
      - name: Install yq
        run: |
          wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          chmod +x /usr/local/bin/yq
      - name: Update image tag
        run: yq e '.web.image.tag = "staging-${{ github.sha }}"' -i charts/mzazicare-service/values.yaml
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add charts/mzazicare-service/values.yaml
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m "ci(mzazicare-web): update staging image tag to staging-${{ github.sha }}"
          git push
